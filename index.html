<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f3f4f6">
  <title>Logic Games</title>
  <meta name="description" content="Logic Games is the home of Revealo, a picture reveal logic puzzle for web and mobile.">
  <style>
    :root {
      --bg: #f3f4f6;
      --ink: #111827;
      --muted: #64748b;
      --card: #ffffff;
      --line: #dbe3ee;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    .shell {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      color: var(--ink);
      text-decoration: none;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: 0;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 850;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: 24px;
      align-items: center;
      background: var(--card);
      border-radius: 28px;
      padding: clamp(24px, 5vw, 48px);
      box-shadow: 0 18px 45px rgba(15, 23, 42, .07);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 2.4vw, 21px);
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border-radius: 999px;
      padding: 11px 18px;
      text-decoration: none;
      font-weight: 950;
    }

    .button.primary {
      background: var(--ink);
      color: #fff;
    }

    .button.secondary {
      background: var(--accent-soft);
      color: var(--ink);
    }

    .preview {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      aspect-ratio: 1;
      width: min(100%, 360px);
      justify-self: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #f8fafc;
    }

    .cell {
      border-radius: 7px;
      background: #fff;
      border: 1px solid #d9e2ef;
    }

    .cell.b { background: #111827; }
    .cell.r { background: #dc2626; }
    .cell.y { background: #facc15; }
    .cell.g { background: #16a34a; }
    .cell.u { background: #2563eb; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-weight: 650;
    }

    footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      nav {
        justify-content: flex-start;
      }

      .hero,
      .cards {
        grid-template-columns: 1fr;
      }

      .preview {
        width: min(100%, 280px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <a class="brand" href="./">Logic Games</a>
      <nav aria-label="Site navigation">
        <a href="./revealo/">Revealo</a>
        <a href="./revealo/about/">About</a>
        <a href="./revealo/privacy/">Privacy</a>
        <a href="./revealo/contact/">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <div>
        <p class="eyebrow">Picture Reveal Logic</p>
        <h1>Revealo</h1>
        <p class="lead">数字と色のヒントをもとに、隠された絵を少しずつ開示していくロジックパズルです。PCでもスマホでもブラウザから遊べます。</p>
        <div class="actions">
          <a class="button primary" href="./revealo/">Play Revealo</a>
          <a class="button secondary" href="./revealo/about/">About</a>
        </div>
      </div>

      <div class="preview" aria-hidden="true">
        <span class="cell"></span><span class="cell u"></span><span class="cell u"></span><span class="cell"></span><span class="cell"></span>
        <span class="cell"></span><span class="cell u"></span><span class="cell y"></span><span class="cell u"></span><span class="cell"></span>
        <span class="cell g"></span><span class="cell y"></span><span class="cell b"></span><span class="cell r"></span><span class="cell u"></span>
        <span class="cell"></span><span class="cell g"></span><span class="cell r"></span><span class="cell r"></span><span class="cell"></span>
        <span class="cell"></span><span class="cell"></span><span class="cell g"></span><span class="cell"></span><span class="cell"></span>
      </div>
    </section>

    <section class="cards" aria-label="Site links">
      <article class="card">
        <h2>Play</h2>
        <p><a href="./revealo/">Revealoを開く</a></p>
      </article>
      <article class="card">
        <h2>Privacy Policy</h2>
        <p><a href="./revealo/privacy/">プライバシーポリシー</a></p>
      </article>
      <article class="card">
        <h2>Contact</h2>
        <p><a href="./revealo/contact/">お問い合わせ</a></p>
      </article>
    </section>

    <footer>© 2026 Logic Games</footer>
  </main>
</body>
</html>
