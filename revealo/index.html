<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Revealo" />
  <title>Revealo</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="pwa-app">
  <main class="app">
    <header class="header">
      <div>
        <h1>Revealo</h1>
        <p>Picture Reveal Logic</p>
      </div>
      <button class="help" id="helpBtn">?</button>
    </header>

    <section class="puzzle-select" id="puzzleSelect"></section>
    <section class="ad-slot" id="adListBottom" aria-label="Advertisement" hidden></section>

    <section class="image-tool" id="imageTool">
      <h2>画像から数値マップ生成</h2>
      <div class="prompt-panel">
        <label>
          画像モード
          <select id="promptColorMode">
            <option value="mono" selected>白黒</option>
            <option value="color">カラー</option>
          </select>
        </label>
        <label>
          カラーパターン
          <select id="palettePreset">
            <option value="auto" selected>Auto</option>
            <option value="classic">Classic</option>
            <option value="forest">Forest</option>
            <option value="ocean">Ocean</option>
            <option value="sakura">Sakura</option>
            <option value="sunset">Sunset</option>
            <option value="autumn">Autumn</option>
            <option value="winter">Winter</option>
            <option value="desert">Desert</option>
            <option value="candy">Candy</option>
            <option value="retro">Retro</option>
          </select>
        </label>
        <label>
          モチーフ
          <input id="promptSubject" type="text" placeholder="空欄なら自動で選びます" />
        </label>
        <label>
          雰囲気
          <input id="promptMood" type="text" value="癒し、シンプル、和風" />
        </label>
        <label>
          色指定
          <input id="promptPalette" type="text" value="#FFFFFF, #9CA3AF, #111827" />
        </label>
        <button id="autoSubjectBtn">モチーフ自動</button>
        <button id="generatePromptBtn">プロンプト生成</button>
        <button id="copyPromptBtn">プロンプトコピー</button>
      </div>
      <textarea id="imagePromptOutput" readonly placeholder="AI画像生成用プロンプトがここに表示されます"></textarea>
      <div class="tool-panel">
        <label>
          画像
          <input id="imageInput" type="file" accept="image/*" />
        </label>
        <label>
          サイズ
          <select id="mapSize">
            <option value="8">8x8</option>
            <option value="10">10x10</option>
            <option value="12" selected>12x12</option>
            <option value="15">15x15</option>
          </select>
        </label>
        <label>
          ヒントレベル
          <select id="clueLevel">
            <option value="easy">Easy: 全表示</option>
            <option value="normal" selected>Normal: 少し隠す</option>
            <option value="hard">Hard: 隠し多め</option>
            <option value="expert">Expert: 難しい</option>
          </select>
        </label>
        <label>
          白しきい値 <span class="range-value" id="whiteThresholdValue">12</span>
          <input id="whiteThreshold" type="range" min="0" max="40" value="12" />
        </label>
        <label>
          線しきい値 <span class="range-value" id="edgeThresholdValue">26</span>
          <input id="edgeThreshold" type="range" min="8" max="80" value="26" />
        </label>
        <label>
          線の濃さ <span class="range-value" id="lineOpacityValue">115</span>
          <input id="lineOpacity" type="range" min="20" max="160" value="115" />
        </label>
        <label>
          線幅 <span class="range-value" id="lineWidthValue">1</span>
          <input id="lineWidth" type="range" min="1" max="4" value="1" />
        </label>
        <button id="generateMapBtn">生成</button>
        <button id="saveToolDefaultsBtn">デフォルト保存</button>
      </div>
      <div class="tool-output">
        <div class="preview-stack">
          <canvas id="mapPreview" width="240" height="240"></canvas>
          <canvas id="linePreview" width="240" height="240"></canvas>
        </div>
        <div class="map-result">
          <textarea id="solutionOutput" readonly placeholder="画像を選択すると白黒またはカラーの solution 配列が表示されます"></textarea>
          <button id="copySolutionBtn">solutionをコピー</button>
          <button id="addImagePuzzleBtn">画像付きパズルを追加</button>
        </div>
      </div>
    </section>

    <div id="gameView" class="game-view hidden">
      <section class="card">
        <button class="back-button" id="backBtn">一覧へ戻る</button>
        <p class="date" id="puzzleMeta"></p>
        <h2 id="puzzleTitle"></h2>
        <p class="desc" id="puzzleDesc"></p>
        <div class="stats">
          <span>ミス <b id="missCount">0</b></span>
          <span><b id="progress">0%</b></span>
          <span id="timer">00:00</span>
        </div>
      </section>

      <section class="board-card">
        <div class="scroll-area">
          <div class="puzzle-layout">
            <div class="corner"></div>
            <div id="colClues" class="col-clues"></div>
            <div id="rowClues" class="row-clues"></div>
            <div id="grid" class="grid"></div>
          </div>
        </div>
      </section>

      <section class="palette" id="palette" aria-label="色選択"></section>

      <nav class="actions">
        <button id="checkBtn">チェック</button>
        <button id="hintBtn">ヒント</button>
        <button id="guessBtn">何の絵？</button>
        <button id="undoBtn">元に戻る</button>
      </nav>
    </div>
  </main>

  <dialog id="clearDialog" class="clear-dialog">
    <div class="clear-dialog-head">
      <p class="clear-kicker">Puzzle Complete</p>
      <h3>クリアしました</h3>
      <p id="clearSummary"></p>
    </div>
    <div class="clear-dialog-actions">
      <button id="nextPuzzleBtn">次のパズルへ</button>
      <button id="shareResultBtn">結果を共有する</button>
      <button id="copyResultBtn">結果をコピー</button>
      <button id="clearBackBtn">パズル一覧へ</button>
      <button id="closeClear">閉じる</button>
    </div>
    <div class="ad-slot clear-ad-slot" id="adClearBottom" aria-label="Advertisement" hidden></div>
  </dialog>

  <dialog id="guessDialog" class="guess-dialog">
    <div class="guess-dialog-head">
      <h3 id="guessDialogTitle">正体を選んでください</h3>
      <p id="guessDialogPrompt">このパズルの正体はどれだと思いますか？</p>
    </div>
    <div id="guessChoices" class="guess-choices"></div>
    <button id="closeGuess">閉じる</button>
  </dialog>

  <dialog id="helpDialog">
    <h3>Revealoの遊び方</h3>
    <p>行と列のヒントを見て、マスを空白・塗り色で埋めます。</p>
    <p>ヒントは、同じ色が何マス連続するかを表します。空白は表示されません。</p>
    <p>画像付きパズルでは、未入力セルに薄い線画が表示され、正解セルは元画像の同じ位置に置き換わります。クリア後は盤面全体に元画像が表示されます。</p>
    <button id="openTutorialBtn">チュートリアルを見る</button>
    <button id="closeHelp">閉じる</button>
  </dialog>

  <dialog id="tutorialDialog" class="tutorial-dialog">
    <div class="tutorial-head">
      <p id="tutorialKicker">Tutorial</p>
      <h3 id="tutorialTitle">リビーロへようこそ</h3>
    </div>
    <div class="tutorial-body">
      <div id="tutorialStepIcon" class="tutorial-icon">1</div>
      <h4 id="tutorialStepTitle"></h4>
      <p id="tutorialStepBody"></p>
      <div id="tutorialDots" class="tutorial-dots" aria-hidden="true"></div>
    </div>
    <div class="tutorial-actions">
      <button id="tutorialSkipBtn">スキップ</button>
      <button id="tutorialPrevBtn">戻る</button>
      <button id="tutorialNextBtn">次へ</button>
    </div>
  </dialog>

  <script src="./ads-config.js"></script>
  <script src="./puzzles.js"></script>
  <script src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
