<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Revealo" />
  <title>Revealo</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8927542236511318" crossorigin="anonymous"></script>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="pwa-app">
  <main class="app">
    <header class="header">
      <div>
        <h1>Revealo</h1>
        <p>Picture Reveal Logic</p>
      </div>
      <div class="header-actions">
        <a class="portal-link" href="https://logicgames.site/">Logic Games</a>
        <button class="help" id="helpBtn">?</button>
      </div>
    </header>

    <section class="puzzle-select" id="puzzleSelect"></section>
    <section class="ad-slot" id="adListBottom" aria-label="Advertisement" hidden></section>


    <div id="gameView" class="game-view hidden">
      <section class="card">
        <button class="back-button" id="backBtn">一覧へ戻る</button>
        <p class="date" id="puzzleMeta"></p>
        <h2 id="puzzleTitle"></h2>
        <p class="desc" id="puzzleDesc"></p>
        <div class="stats">
          <span>ミス <b id="missCount">0</b></span>
          <span><b id="progress">0%</b></span>
          <span id="timer">00:00</span>
        </div>
      </section>

      <section class="board-card">
        <div class="scroll-area">
          <div class="puzzle-layout">
            <div class="corner"></div>
            <div id="colClues" class="col-clues"></div>
            <div id="rowClues" class="row-clues"></div>
            <div id="grid" class="grid"></div>
          </div>
        </div>
      </section>

      <section class="palette" id="palette" aria-label="色選択"></section>

      <nav class="actions">
        <button id="checkBtn">チェック</button>
        <button id="hintBtn">ヒント</button>
        <button id="guessBtn">何の絵？</button>
        <button id="undoBtn">元に戻る</button>
      </nav>
    </div>
  </main>

  <dialog id="clearDialog" class="clear-dialog">
    <div class="clear-dialog-head">
      <p class="clear-kicker">Puzzle Complete</p>
      <h3>クリアしました</h3>
      <p id="clearSummary"></p>
    </div>
    <div class="clear-dialog-actions">
      <button id="nextPuzzleBtn">次のパズルへ</button>
      <button id="shareResultBtn">結果を共有する</button>
      <button id="copyResultBtn">結果をコピー</button>
      <button id="clearBackBtn">パズル一覧へ</button>
      <button id="closeClear">閉じる</button>
    </div>
    <div class="ad-slot clear-ad-slot" id="adClearBottom" aria-label="Advertisement" hidden></div>
  </dialog>

  <dialog id="guessDialog" class="guess-dialog">
    <div class="guess-dialog-head">
      <h3 id="guessDialogTitle">正体を選んでください</h3>
      <p id="guessDialogPrompt">このパズルの正体はどれだと思いますか？</p>
    </div>
    <div id="guessChoices" class="guess-choices"></div>
    <button id="closeGuess">閉じる</button>
  </dialog>

  <dialog id="helpDialog">
    <h3>Revealoの遊び方</h3>
    <p>行と列のヒントを見て、マスを空白・塗り色で埋めます。</p>
    <p>ヒントは、同じ色が何マス連続するかを表します。空白は表示されません。</p>
    <p>画像付きパズルでは、未入力セルに薄い線画が表示され、正解セルは元画像の同じ位置に置き換わります。クリア後は盤面全体に元画像が表示されます。</p>
    <button id="openTutorialBtn">チュートリアルを見る</button>
    <button id="closeHelp">閉じる</button>
  </dialog>

  <dialog id="tutorialDialog" class="tutorial-dialog">
    <div class="tutorial-head">
      <p id="tutorialKicker">Tutorial</p>
      <h3 id="tutorialTitle">リビーロへようこそ</h3>
    </div>
    <div class="tutorial-body">
      <div id="tutorialStepIcon" class="tutorial-icon">1</div>
      <h4 id="tutorialStepTitle"></h4>
      <p id="tutorialStepBody"></p>
      <div id="tutorialDots" class="tutorial-dots" aria-hidden="true"></div>
    </div>
    <div class="tutorial-actions">
      <button id="tutorialSkipBtn">スキップ</button>
      <button id="tutorialPrevBtn">戻る</button>
      <button id="tutorialNextBtn">次へ</button>
    </div>
  </dialog>

  <script src="./ads-config.js"></script>
  <script src="./puzzles.js"></script>
  <script src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
